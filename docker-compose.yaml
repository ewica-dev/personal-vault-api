services:
  postgres:
    image: postgres:16.3
    container_name: personal-vault-postgres
    environment:
      POSTGRES_DB: personal_vault_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: